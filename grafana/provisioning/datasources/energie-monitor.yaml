apiVersion: 1

datasources:
  - name: EnergieMonitor
    uid: energie_monitor
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://energie_monitor:8080
    isDefault: false
    editable: true
    jsonData:
      allowedHosts:
        - http://energie_monitor:8080
      # Jahres-Lastgang / Aggregate: Volkszähler-Aggregation sollte schnell sein;
      # Puffer für HA-History und erste Anfrage nach Neustart.
      timeoutInSeconds: 300
