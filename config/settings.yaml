# Allgemeine Einstellungen
settings:
  timezone: "Europe/Berlin"
  currency: "EUR"
  date_format: "%d.%m.%Y"
  
  fints:
    enabled: true
    product_id: "FINANZEN_APP_1.0"  # Eindeutige Product-ID für Ihre App
    # Postbank-spezifische Einstellungen
    default_days: 30  # Standard: letzte 30 Tage abrufen
    retry_attempts: 3
    timeout: 60
    
  pdf_parsing:
    enabled: true
    watch_folder: "data/inbox"
    
  database:
    type: "mariadb"
    host: "db"
    port: 3306
    name: "finanzen"

# Kategorisierungsregeln (optional - Standard-Regeln sind im Code hinterlegt)
# Format: Kategorie-Name: Liste von Regex-Patterns oder Pattern-Objekten mit Priorität
categorization_rules:
  # Einnahmen
  "Gehalt":
    - pattern: '\b(gehalt|lohn|salary)\b'
      priority: 100
  
  "Miete Sonnenberg":
    - pattern: '\b(miete.*von.*sonnenberg)\b'
      priority: 95
  
  # Wohnen
  "Internet":
    - pattern: '\b(telekom|vodafone|1&1)\b'
      priority: 85
  
  # Eigene Custom-Regeln hier hinzufügen
  # "Meine Kategorie":
  #   - '\b(pattern1|pattern2)\b'

