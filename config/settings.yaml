# Allgemeine Einstellungen
settings:
  timezone: "Europe/Berlin"
  currency: "EUR"
  date_format: "%d.%m.%Y"
  
  fints:
    enabled: true
    product_id: "FINANZEN_APP_1.0"  # Eindeutige Product-ID für Ihre App
    # Postbank-spezifische Einstellungen
    default_days: 30  # Standard: letzte 30 Tage abrufen
    retry_attempts: 3
    timeout: 60
    
  pdf_parsing:
    enabled: true
    watch_folder: "data/inbox"
  
  # Ollama als Fallback für PDF-Transaktionsextraktion (nach Tesseract)
  # Erfordert: Ollama läuft auf Host (z.B. openclaw), OLLAMA_HOST=0.0.0.0
  ollama:
    enabled: false
    host: "http://openclaw:11434"
    model: "qwen2.5:7b"  # oder deepseek-r1, llama3.2, etc.
    timeout: 60
    
  database:
    type: "mariadb"
    host: "db"
    port: 3306
    name: "finanzen"

# Kategorisierungsregeln (optional - wenn auskommentiert, werden Standard-Regeln verwendet)
# Format: Kategorie-Name: Liste von Regex-Patterns oder Pattern-Objekten mit Priorität
# 
# HINWEIS: Auskommentiert, damit die umfangreichen Standard-Regeln im Code verwendet werden.
# Diese umfassen ~50 Regeln für alle gängigen Kategorien.
# 
# Eigene Custom-Regeln können hier hinzugefügt werden - dann werden sie MIT den Standard-Regeln kombiniert:
# 
# categorization_rules:
#   "Gehalt":
#     - pattern: '\b(gehalt|lohn|salary)\b'
#       priority: 100
#   
#   "Miete Sonnenberg":
#     - pattern: '\b(miete.*von.*sonnenberg)\b'
#       priority: 95
#   
#   "Internet":
#     - pattern: '\b(telekom|vodafone|1&1)\b'
#       priority: 85

